<svg xmlns="http://www.w3.org/2000/svg" width="560" height="112" viewBox="0 0 560 112" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#12100c"/>
    </linearGradient>
  </defs>

  <!-- ═══════ SHARED TEMPLATE (macro for each frame) ═══════ -->
  <!-- Frame structure: hood → hair → face → eyes → beard → mouth (varies) -->

  <!-- ══════════ FRAME 1: Mouth Closed ══════════ -->
  <g id="f1">
    <rect width="112" height="112" fill="url(#bg)"/>
    <!-- Hood outer -->
    <polygon points="16,8 96,8 104,28 8,28" fill="#1e1812"/>
    <polygon points="8,28 104,28 108,52 4,52" fill="#2a1f18"/>
    <polygon points="4,52 108,52 100,80 12,80" fill="#231c15"/>
    <!-- Hood inner shadow -->
    <polygon points="24,24 88,24 92,48 20,48" fill="#18140f"/>
    <!-- Hood rim / gold thread -->
    <line x1="20" y1="28" x2="92" y2="28" stroke="#6b5530" stroke-width="1.5"/>
    <!-- Hair flowing from hood -->
    <rect x="20" y="28" width="8" height="32" fill="#9a9590" rx="0"/>
    <rect x="22" y="32" width="6" height="36" fill="#b0aaa2" rx="0"/>
    <rect x="84" y="28" width="8" height="32" fill="#9a9590" rx="0"/>
    <rect x="84" y="32" width="6" height="36" fill="#b0aaa2" rx="0"/>
    <!-- Hair strands -->
    <rect x="20" y="60" width="4" height="12" fill="#8a8580"/>
    <rect x="24" y="64" width="4" height="10" fill="#9a9590"/>
    <rect x="84" y="60" width="4" height="12" fill="#8a8580"/>
    <rect x="88" y="64" width="4" height="8" fill="#9a9590"/>
    <!-- Face base -->
    <rect x="32" y="30" width="48" height="40" fill="#9a7550"/>
    <rect x="36" y="32" width="40" height="36" fill="#b59065"/>
    <rect x="40" y="34" width="32" height="30" fill="#cca87a"/>
    <!-- Forehead shadow -->
    <rect x="36" y="30" width="40" height="6" fill="#8a6842"/>
    <!-- Brow ridge -->
    <rect x="38" y="36" width="14" height="3" fill="#8a6842"/>
    <rect x="60" y="36" width="14" height="3" fill="#8a6842"/>
    <!-- Eyes - left -->
    <rect x="40" y="40" width="12" height="8" fill="#1a1510"/>
    <rect x="42" y="42" width="4" height="4" fill="#5588aa"/>
    <rect x="46" y="42" width="4" height="4" fill="#334466"/>
    <rect x="42" y="41" width="8" height="1" fill="#cca87a"/>
    <!-- Eyes - right -->
    <rect x="60" y="40" width="12" height="8" fill="#1a1510"/>
    <rect x="62" y="42" width="4" height="4" fill="#5588aa"/>
    <rect x="66" y="42" width="4" height="4" fill="#334466"/>
    <rect x="62" y="41" width="8" height="1" fill="#cca87a"/>
    <!-- Eye glow -->
    <rect x="42" y="42" width="2" height="2" fill="#88bbdd" opacity="0.7"/>
    <rect x="62" y="42" width="2" height="2" fill="#88bbdd" opacity="0.7"/>
    <!-- Nose -->
    <rect x="53" y="48" width="6" height="8" fill="#b59065"/>
    <rect x="54" y="50" width="4" height="6" fill="#9a7550"/>
    <rect x="55" y="54" width="2" height="2" fill="#8a6842"/>
    <!-- Cheek shadows -->
    <rect x="36" y="50" width="4" height="8" fill="#9a7550"/>
    <rect x="72" y="50" width="4" height="8" fill="#9a7550"/>
    <!-- Beard - upper -->
    <rect x="36" y="58" width="40" height="4" fill="#9a9590"/>
    <rect x="34" y="62" width="44" height="6" fill="#a5a098"/>
    <rect x="32" y="68" width="48" height="6" fill="#b0aaa2"/>
    <rect x="34" y="74" width="44" height="4" fill="#bfb8b0"/>
    <!-- Beard texture -->
    <rect x="38" y="60" width="2" height="8" fill="#8a8580"/>
    <rect x="46" y="62" width="2" height="6" fill="#8a8580"/>
    <rect x="56" y="60" width="2" height="8" fill="#8a8580"/>
    <rect x="64" y="62" width="2" height="6" fill="#8a8580"/>
    <rect x="72" y="60" width="2" height="6" fill="#8a8580"/>
    <!-- Beard bottom strands -->
    <rect x="38" y="78" width="4" height="6" fill="#b0aaa2"/>
    <rect x="46" y="78" width="4" height="8" fill="#bfb8b0"/>
    <rect x="54" y="78" width="4" height="10" fill="#bfb8b0"/>
    <rect x="62" y="78" width="4" height="8" fill="#bfb8b0"/>
    <rect x="70" y="78" width="4" height="6" fill="#b0aaa2"/>
    <!-- Mouth (closed) -->
    <rect x="46" y="58" width="20" height="3" fill="#6a4a30"/>
    <rect x="48" y="59" width="16" height="1" fill="#3a2a1c"/>
    <!-- Cloak/shoulders -->
    <polygon points="0,70 28,52 28,112 0,112" fill="#1e1812"/>
    <polygon points="112,70 84,52 84,112 112,112" fill="#1e1812"/>
    <polygon points="0,75 24,58 24,112 0,112" fill="#2a1f18"/>
    <polygon points="112,75 88,58 88,112 112,112" fill="#2a1f18"/>
    <!-- Cloak clasp -->
    <rect x="50" y="82" width="12" height="4" fill="#c9a227" opacity="0.8"/>
    <rect x="52" y="84" width="8" height="2" fill="#e0c040" opacity="0.6"/>
  </g>

  <!-- ══════════ FRAME 2: Mouth Barely Open ══════════ -->
  <use href="#f1" x="112" y="0"/>
  <g transform="translate(112,0)">
    <!-- Override mouth area -->
    <rect x="36" y="56" width="40" height="8" fill="#9a9590"/>
    <rect x="46" y="57" width="20" height="5" fill="#6a4a30"/>
    <rect x="48" y="58" width="16" height="3" fill="#3a2018"/>
    <rect x="50" y="59" width="12" height="1" fill="#1a0a05"/>
  </g>

  <!-- ══════════ FRAME 3: Mouth Half Open ══════════ -->
  <use href="#f1" x="224" y="0"/>
  <g transform="translate(224,0)">
    <rect x="36" y="56" width="40" height="10" fill="#9a9590"/>
    <rect x="44" y="56" width="24" height="8" fill="#6a4a30"/>
    <rect x="46" y="57" width="20" height="6" fill="#3a2018"/>
    <rect x="48" y="58" width="16" height="4" fill="#1a0a05"/>
    <!-- Teeth hint -->
    <rect x="50" y="58" width="4" height="1" fill="#d4c8b0"/>
    <rect x="58" y="58" width="4" height="1" fill="#d4c8b0"/>
  </g>

  <!-- ══════════ FRAME 4: Mouth Open ══════════ -->
  <use href="#f1" x="336" y="0"/>
  <g transform="translate(336,0)">
    <rect x="36" y="56" width="40" height="12" fill="#9a9590"/>
    <rect x="42" y="55" width="28" height="10" fill="#6a4a30"/>
    <rect x="44" y="56" width="24" height="8" fill="#3a2018"/>
    <rect x="46" y="57" width="20" height="6" fill="#1a0a05"/>
    <!-- Teeth -->
    <rect x="48" y="57" width="4" height="2" fill="#d4c8b0"/>
    <rect x="54" y="57" width="4" height="2" fill="#d4c8b0"/>
    <rect x="60" y="57" width="4" height="2" fill="#d4c8b0"/>
    <!-- Tongue hint -->
    <rect x="52" y="61" width="8" height="2" fill="#8a4040"/>
  </g>

  <!-- ══════════ FRAME 5: Mouth Wide Open ══════════ -->
  <use href="#f1" x="448" y="0"/>
  <g transform="translate(448,0)">
    <rect x="36" y="55" width="40" height="14" fill="#9a9590"/>
    <rect x="40" y="54" width="32" height="12" fill="#6a4a30"/>
    <rect x="42" y="55" width="28" height="10" fill="#3a2018"/>
    <rect x="44" y="56" width="24" height="8" fill="#1a0a05"/>
    <!-- Teeth top -->
    <rect x="46" y="56" width="4" height="2" fill="#d4c8b0"/>
    <rect x="52" y="56" width="4" height="2" fill="#d4c8b0"/>
    <rect x="58" y="56" width="4" height="2" fill="#d4c8b0"/>
    <!-- Teeth bottom -->
    <rect x="48" y="62" width="4" height="2" fill="#c8bca8"/>
    <rect x="56" y="62" width="4" height="2" fill="#c8bca8"/>
    <!-- Tongue -->
    <rect x="50" y="60" width="12" height="3" fill="#8a4040"/>
    <rect x="52" y="61" width="8" height="2" fill="#a05050"/>
  </g>
</svg>
